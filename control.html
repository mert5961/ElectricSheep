<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep — Control</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      background:
        radial-gradient(circle at top, rgba(55, 91, 124, 0.18), transparent 40%),
        linear-gradient(180deg, #0b0d11 0%, #0f141b 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #ccc;
    }

    #control-root {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }
  </style>
</head>
<body>
  <div id="control-root"></div>
  <script type="module" src="/src/control-main.js"></script>
</body>
</html>
