<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep — Control</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(170, 255, 150, 0.08), transparent 34%),
        linear-gradient(180deg, #040904 0%, #081108 100%);
      font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      color: #d5f7c4;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    #webgl-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #overlay .handle {
      pointer-events: auto;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      isolation: isolate;
    }

    #ui > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="webgl-canvas"></canvas>
    <div id="overlay"></div>
    <div id="ui"></div>
  </div>
  <script type="module" src="./src/control-main.js"></script>
</body>
</html>
