<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep — Control</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(96, 161, 255, 0.2), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 180, 84, 0.1), transparent 36%),
        linear-gradient(180deg, #0a0d12 0%, #0f141b 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #ccc;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #webgl-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #overlay .handle {
      pointer-events: auto;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #ui > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="webgl-canvas"></canvas>
    <div id="overlay"></div>
    <div id="ui"></div>
  </div>
  <script type="module" src="./src/control-main.js"></script>
</body>
</html>
