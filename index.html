<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #ccc;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* WebGL layer — behind everything */
    #webgl-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* DOM overlay — control handles live here */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #overlay .handle {
      pointer-events: auto;
    }

    /* UI controls layer — buttons, sliders */
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #ui > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="webgl-canvas"></canvas>
    <div id="overlay"></div>
    <div id="ui"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
