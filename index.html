<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #111;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing {
      text-align: center;
    }

    .landing h1 {
      font-size: 28px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 8px;
    }

    .landing p {
      font-size: 14px;
      color: #666;
      margin-bottom: 36px;
    }

    .landing .links {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .landing a {
      display: block;
      padding: 14px 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      transition: background 0.15s;
    }

    .landing a:hover {
      background: rgba(255,255,255,0.15);
    }

    .landing a span {
      display: block;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Electric Sheep</h1>
    <p>Projection mapping and visual orchestration</p>
    <div class="links">
      <a href="/control.html">
        Control Screen
        <span>Operator interface</span>
      </a>
      <a href="/output.html">
        Output Screen
        <span>Projector output</span>
      </a>
    </div>
  </div>
</body>
</html>
