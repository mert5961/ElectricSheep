<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(96, 161, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #090c11 0%, #0f141b 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing {
      text-align: center;
    }

    .landing h1 {
      font-size: 30px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 8px;
    }

    .landing p {
      font-size: 14px;
      color: #7c8898;
      margin-bottom: 36px;
    }

    .landing .links {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .landing a {
      display: block;
      padding: 14px 28px;
      min-width: 220px;
      padding: 16px 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #d7deea;
      text-decoration: none;
      font-size: 15px;
      transition: background 0.15s, transform 0.15s, border-color 0.15s;
    }

    .landing a:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .landing a span {
      display: block;
      font-size: 11px;
      color: #7c8898;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Electric Sheep</h1>
    <p>Control brain and projected body</p>
    <div class="links">
      <a href="./control.html">
        Control Window
        <span>Geo Master and Shader Master editing</span>
      </a>
      <a href="./output.html">
        Output Window
        <span>Clean stage output for the projector</span>
      </a>
    </div>
  </div>
</body>
</html>
