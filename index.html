<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Sheep</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(170, 255, 150, 0.08), transparent 30%),
        linear-gradient(180deg, #040904 0%, #081108 100%);
      font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      color: #cde9bf;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing {
      text-align: center;
    }

    .landing h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #efffdc;
      margin-bottom: 8px;
    }

    .landing p {
      font-size: 14px;
      color: #8fb181;
      margin-bottom: 36px;
    }

    .landing .links {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .landing a {
      display: block;
      padding: 14px 28px;
      min-width: 220px;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(15, 30, 14, 0.96) 0%, rgba(7, 18, 7, 0.98) 100%);
      border: 1px solid rgba(120, 170, 96, 0.28);
      border-radius: 2px;
      color: #d5f7c4;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      box-shadow: inset 0 0 0 1px rgba(189,255,172,0.03), 0 0 12px rgba(116,255,108,0.05);
    }

    .landing a:hover {
      background: linear-gradient(180deg, rgba(22, 42, 20, 0.98) 0%, rgba(9, 22, 9, 1) 100%);
      border-color: rgba(166, 223, 134, 0.5);
      box-shadow: inset 0 0 0 1px rgba(189,255,172,0.08), 0 0 16px rgba(116,255,108,0.12);
    }

    .landing a span {
      display: block;
      font-size: 11px;
      color: #8fb181;
      margin-top: 4px;
      text-transform: none;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Electric Sheep</h1>
    <p>Control brain and projected body</p>
    <div class="links">
      <a href="./control.html">
        Control Window
        <span>Geo Master and Shader Master editing</span>
      </a>
      <a href="./output.html">
        Output Window
        <span>Clean stage output for the projector</span>
      </a>
    </div>
  </div>
</body>
</html>
